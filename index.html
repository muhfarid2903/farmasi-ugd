    .sync-dot { width: 7px; height: 7px; border-radius: 50%; }
    .sync-dot.online { background: var(--green); animation: pulse 2s infinite; }
    .sync-dot.offline { background: var(--red); }
    .sync-dot.loading { background: var(--orange); animation: pulse 1s infinite; }

    .main-area { display: flex; flex: 1; }
    .sidebar {

    .nav-btn {

      border-radius: 8px; cursor: pointer; transition: all 0.15s;

    .nav-btn:hover { background: var(--bg3); color: var(--text); }
    .nav-btn.active { background: var(--accent-bg); color: var(--accent); }
    .nav-btn .badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; }

    .content { flex: 1; padding: 24px; overflow-y: auto; max-height: calc(100vh - 73px); }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .page-sub { color: var(--text2); font-size: 13px; margin-bottom: 24px; }

    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .stat-label { font-size: 12px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

    .stat-value.orange { color: var(--orange); } .stat-value.red { color: var(--red); }

    .section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

    select option { background: var(--bg2); color: var(--text); }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: none; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: var(--bg); }

    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg3); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-masuk { background: var(--green-bg); color: var(--green); border: 1px solid rgba(81,207,102,0.2); }
    .btn-keluar { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(255,169,77,0.2); }

    th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); border-bottom: 1px solid var(--border); }

    .low-stock-card { background: var(--orange-bg); border: 1px solid rgba(255,169,77,0.2); border-radius: var(--radius); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

    .low-stock-count { font-family: 'JetBrains Mono', monospace; color: var(--orange); font-weight: 700; font-size: 18px; }
    .kritis-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); transition: all 0.15s; }

    .kritis-check { width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--text3); display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }

    .form-error { color: var(--red); font-size: 12px; margin-bottom: 12px; padding: 8px 12px; background: var(--red-bg); border-radius: 6px; }

    .item-dropdown-row {

    .item-dropdown-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }

    .item-dropdown-empty { padding: 14px; text-align: center; color: var(--text3); font-size: 12px; }

      .sidebar { display: none; }
      .quick-actions { flex-direction: column; }
      .mobile-nav { display: block; }
      .content { max-height: calc(100vh - 73px - 60px); padding-bottom: 80px; }
    }
    @media (max-width:600px) {
      .stats-row { grid-template-columns: 1fr; }
      .header { padding: 12px 16px; }
      .content { padding: 16px; }
      .form-row { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; }
    }
  </style>

        const u1 = db.collection("items").orderBy("name").onSnapshot(
          snap => {
            const d = snap.docs.map(doc=>({id:doc.id,...doc.data()}));
            setItems(d); setSyncStatus("online"); il=true; ck();
            if(d.length===0 && !seeded.current) { seeded.current=true; seedData(); }
          },
          () => { setSyncStatus("offline"); il=true; ck(); }
        );
        const u2 = db.collection("transactions").orderBy("createdAt","desc").onSnapshot(
          snap => { setTransactions(snap.docs.map(doc=>({id:doc.id,...doc.data()}))); tl=true; ck(); },
          () => { tl=true; ck(); }
        );
        return () => { u1(); u2(); };
      }, []);

      async function seedData() {
        if(!db) return;
        const b = db.batch();
        defaultItems.forEach(it => b.set(db.collection("items").doc(), {...it, createdAt:nowISO()}));
        await b.commit();
      }

      async function handleAddItem() {
        if(!formItem.name||!formItem.stock||!formItem.minStock) { setFormError("Semua field wajib diisi"); return; }
        try {
          const data = {name:formItem.name, category:formItem.category, unit:formItem.unit, stock:Number(formItem.stock), minStock:Number(formItem.minStock), kritis:formItem.kritis||false};
          if(editItem) await db.collection("items").doc(editItem.id).update(data);
          else await db.collection("items").add({...data, createdAt:nowISO()});
          setShowModal(null); setEditItem(null);
          setFormItem({name:"",category:"Obat",unit:"tablet",stock:"",minStock:"",kritis:false}); setFormError("");
        } catch(e) { setFormError("Gagal menyimpan: "+e.message); }
      }

      async function handleDeleteItem(id) {
        if(confirm("Yakin hapus item ini?")) { try { await db.collection("items").doc(id).delete(); } catch(e) { alert("Gagal: "+e.message); } }
      }

      async function handleAddTx() {
        if(!formTx.itemId||!formTx.qty||!formTx.operator) { setFormError("Item, jumlah, dan petugas wajib diisi"); return; }
        const item = items.find(i=>i.id===formTx.itemId);
        if(!item) return;
        const qty = Number(formTx.qty);

        if(editTx) {
          try {
            // Reverse old stock
            const oldItem = items.find(i=>i.id===editTx.itemId);
            if(oldItem) {
              const reversedStock = editTx.type==="masuk" ? oldItem.stock - editTx.qty : oldItem.stock + editTx.qty;
              await db.collection("items").doc(editTx.itemId).update({stock:reversedStock});
            }
            // Re-fetch item stock after reversal (may be same item)
            const freshDoc = await db.collection("items").doc(item.id).get();
            const freshStock = freshDoc.exists ? freshDoc.data().stock : item.stock;
            if(formTx.type==="keluar" && qty>freshStock) { setFormError("Stok tidak cukup! Tersedia: "+freshStock+" "+item.unit); return; }
            // Apply new stock
            const newStock = formTx.type==="masuk" ? freshStock+qty : freshStock-qty;
            await db.collection("items").doc(item.id).update({stock:newStock});
            // Update transaction doc
            await db.collection("transactions").doc(editTx.id).update({itemId:item.id, itemName:item.name, type:formTx.type, qty, date:formTx.date, note:formTx.note, operator:formTx.operator});
            setShowModal(null); setEditTx(null); setFormTx({itemId:"",type:"masuk",qty:"",date:todayStr(),note:"",operator:""}); setFormError("");
          } catch(e) { setFormError("Gagal: "+e.message); }
        } else {
          if(formTx.type==="keluar" && qty>item.stock) { setFormError("Stok tidak cukup! Tersedia: "+item.stock+" "+item.unit); return; }
          try {
            const newStock = formTx.type==="masuk" ? item.stock+qty : item.stock-qty;
            await db.collection("items").doc(item.id).update({stock:newStock});
            await db.collection("transactions").add({itemId:item.id, itemName:item.name, type:formTx.type, qty, date:formTx.date, note:formTx.note, operator:formTx.operator, createdAt:nowISO()});
            setShowModal(null); setFormTx({itemId:"",type:"masuk",qty:"",date:todayStr(),note:"",operator:""}); setFormError("");
          } catch(e) { setFormError("Gagal: "+e.message); }
        }
      }

      function handleExportCSV() { setShowExport(true); }

      const [exportCSV, setExportCSV] = useState("");

      function handleFilteredExport() {
        let filtered;
        let filename;
        if(exportMode==="bulan") {
          filtered = transactions.filter(tx=>tx.date&&tx.date.startsWith(exportBulan));
          const [y,m] = exportBulan.split("-");
          const bn = ["","Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
          filename = "rekap_ugd_"+bn[parseInt(m)]+"_"+y+".csv";
        } else {
          filtered = transactions.filter(tx=>tx.date&&tx.date>=exportFrom&&tx.date<=exportTo);
          filename = "rekap_ugd_"+exportFrom+"_sd_"+exportTo+".csv";
        }
        if(filtered.length===0) { alert("Tidak ada transaksi pada periode yang dipilih."); return; }
        const masuk=filtered.filter(t=>t.type==="masuk");
        const keluar=filtered.filter(t=>t.type==="keluar");
        let csv = "REKAP TRANSAKSI UGD PUSKESMAS L. TUPABBIRING\n";
        csv += exportMode==="bulan" ? "Periode: "+exportBulan+"\n" : "Periode: "+exportFrom+" s/d "+exportTo+"\n";
        csv += "Total Transaksi: "+filtered.length+" (Masuk: "+masuk.length+" | Keluar: "+keluar.length+")\n";
        csv += "Diekspor: "+new Date().toLocaleString("id-ID")+"\n\n";
        csv += "No,Tanggal,Item,Tipe,Jumlah,Keterangan,Petugas\n";
        filtered.sort((a,b)=>a.date>b.date?1:-1).forEach((tx,idx)=>{
          csv += (idx+1)+","+tx.date+",\""+tx.itemName+"\","+(tx.type==="masuk"?"Masuk":"Keluar")+","+tx.qty+",\""+(tx.note||"")+"\",\""+tx.operator+"\"\n";
        });
        setExportCSV(csv); setExportFilename(filename);
        try {
          const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a"); a.href=url; a.download=filename;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch(e) {
          try {
            const a = document.createElement("a");
            a.href = "data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
            a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
          } catch(e2) {}
        }
      }

              <button className={"nav-btn "+(page==="dashboard"?"active":"")} onClick={()=>setPage("dashboard")}><Icon type="home" size={18}/> Dashboard</button>
              <button className={"nav-btn "+(page==="stok"?"active":"")} onClick={()=>setPage("stok")}><Icon type="package" size={18}/> Data Stok {lowStockItems.length>0&&<span className="badge">{lowStockItems.length}</span>}</button>
              <button className={"nav-btn "+(page==="transaksi"?"active":"")} onClick={()=>setPage("transaksi")}><Icon type="clock" size={18}/> Transaksi</button>
            </div>
            <div className="content">

              {page==="dashboard" && <>
                <h1 className="page-title">Dashboard UGD</h1>
                <p className="page-sub">Puskesmas Liukang Tupabbiring, Kab. Pangkep — {formatDate(todayStr())}</p>
                <div className="info-banner green"><Icon type="wifi" size={16}/> Data tersinkronisasi real-time ke semua perangkat petugas UGD.</div>
                <div className="stats-row">
                  <div className="stat-card"><div className="stat-label">Total Jenis Item</div><div className="stat-value blue">{items.length}</div></div>
                  <div className="stat-card"><div className="stat-label">Total Stok</div><div className="stat-value green">{totalStock.toLocaleString("id-ID")}</div></div>
                  <div className="stat-card"><div className="stat-label">Transaksi Hari Ini</div><div className="stat-value orange">{todayTx.length}</div></div>
                  <div className="stat-card"><div className="stat-label">Stok Menipis</div><div className="stat-value red">{criticalLowStock.length > 0 ? criticalLowStock.length + " kritis · " : ""}{lowStockItems.length}</div></div>
                </div>
                <div className="quick-actions">
                  <button className="quick-btn" onClick={()=>{setFormTx({itemId:"",type:"masuk",qty:"",date:todayStr(),note:"",operator:""});setItemSearch("");setShowItemDropdown(false);setEditTx(null);setShowModal("addTx");}}>
                    <div className="icon-wrap" style={{background:"var(--green-bg)",color:"var(--green)"}}><Icon type="arrowDown" size={22}/></div>
                    <div><div className="qb-title">Barang Masuk</div><div className="qb-sub">Catat penerimaan obat/bahan</div></div>
                  </button>
                  <button className="quick-btn" onClick={()=>{setFormTx({itemId:"",type:"keluar",qty:"",date:todayStr(),note:"",operator:""});setItemSearch("");setShowItemDropdown(false);setEditTx(null);setShowModal("addTx");}}>
                    <div className="icon-wrap" style={{background:"var(--orange-bg)",color:"var(--orange)"}}><Icon type="arrowUp" size={22}/></div>
                    <div><div className="qb-title">Barang Keluar</div><div className="qb-sub">Catat pengeluaran obat/bahan</div></div>
                  </button>
                  <button className="quick-btn" onClick={()=>{setEditItem(null);setFormItem({name:"",category:"Obat",unit:"tablet",stock:"",minStock:"",kritis:false});setShowModal("addItem");}}>
                    <div className="icon-wrap" style={{background:"var(--blue-bg)",color:"var(--blue)"}}><Icon type="plus" size={22}/></div>
                    <div><div className="qb-title">Tambah Item</div><div className="qb-sub">Daftarkan obat/bahan baru</div></div>
                  </button>
                  <button className="quick-btn" onClick={()=>setShowExport(true)}>
                    <div className="icon-wrap" style={{background:"rgba(168,85,247,0.08)",color:"#a855f7"}}><Icon type="download" size={22}/></div>
                    <div><div className="qb-title">Download Rekap</div><div className="qb-sub">Ekspor transaksi per bulan/tanggal</div></div>
                  </button>
                </div>
                {criticalLowStock.length>0 && <>
                  <div className="section-title"><div className="dot" style={{background:"var(--red)",animation:"pulse 1s infinite"}}/> <span style={{color:"var(--red)"}}>KRITIS — Obat & Bahan Emergency Menipis</span></div>
                  {criticalLowStock.map(it=><div key={it.id} className="critical-stock-card"><div><div className="critical-stock-name">{it.name}</div><div className="low-stock-detail">{it.category} · Min: {it.minStock} {it.unit}</div></div><div style={{textAlign:"right"}}><div className="critical-stock-count">{it.stock}</div><div style={{fontSize:11,color:"var(--text3)"}}>{it.unit}</div></div></div>)}
                </>}
                {regularLowStock.length>0 && <>
                  <div className="section-title" style={{marginTop:criticalLowStock.length>0?20:0}}><div className="dot" style={{background:"var(--orange)"}}/> Peringatan Stok Menipis</div>
                  {regularLowStock.map(it=><div key={it.id} className="low-stock-card"><div><div className="low-stock-name">{it.name}</div><div className="low-stock-detail">{it.category} · Min: {it.minStock} {it.unit}</div></div><div style={{textAlign:"right"}}><div className="low-stock-count">{it.stock}</div><div style={{fontSize:11,color:"var(--text3)"}}>{it.unit}</div></div></div>)}
                </>}
                <div className="recent-tx"><div className="recent-tx-header"><div className="section-title" style={{margin:0}}><div className="dot" style={{background:"var(--accent)"}}/> Transaksi Terakhir</div></div>
                  <table><thead><tr><th>Tanggal</th><th>Item</th><th>Tipe</th><th>Jumlah</th><th>Keterangan</th><th>Petugas</th><th>Aksi</th></tr></thead>
                  <tbody>{transactions.slice(0,5).map(tx=><tr key={tx.id}><td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{formatDate(tx.date)}</td><td style={{fontWeight:500}}>{tx.itemName}</td><td><span className={"tag tag-"+tx.type}>{tx.type==="masuk"?"↓ Masuk":"↑ Keluar"}</span></td><td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{tx.qty}</td><td style={{color:"var(--text2)"}}>{tx.note||"-"}</td><td>{tx.operator}</td><td><button className="btn btn-ghost btn-sm" onClick={()=>openEditTx(tx)}><Icon type="edit" size={14}/></button></td></tr>)}
                  {transactions.length===0&&<tr><td colSpan={7} style={{textAlign:"center",padding:30,color:"var(--text3)"}}>Belum ada transaksi</td></tr>}</tbody></table>
                </div>
              </>}

              {page==="stok" && <>
                <h1 className="page-title">Data Stok</h1><p className="page-sub">Daftar seluruh obat dan bahan medis di UGD</p>
                <div className="toolbar">
                  <div className="search-box"><Icon type="search" size={16}/><input placeholder="Cari nama obat/bahan..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
                  <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="select-box"><option value="Semua">Semua Kategori</option>{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select>
                  <select value={filterKritis} onChange={e=>setFilterKritis(e.target.value)} className="select-box"><option value="semua">Semua Status</option><option value="kritis">⚠ Kritis Saja</option><option value="non-kritis">Non-Kritis Saja</option></select>
                  <button className="btn btn-primary" onClick={()=>{setEditItem(null);setFormItem({name:"",category:"Obat",unit:"tablet",stock:"",minStock:"",kritis:false});setShowModal("addItem");}}><Icon type="plus" size={16}/> Tambah Item</button>
                </div>
                <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"var(--radius)",overflow:"hidden"}}>
                  <table><thead><tr><th>Nama</th><th>Kategori</th><th>Status</th><th>Stok</th><th>Min. Stok</th><th>Aksi</th></tr></thead>
                  <tbody>{filteredItems.length===0?<tr><td colSpan={6} style={{textAlign:"center",padding:40,color:"var(--text3)"}}>Tidak ada data</td></tr>:filteredItems.map(item=><tr key={item.id}><td style={{fontWeight:600}}>{item.name}</td><td><span className="tag tag-cat">{item.category}</span></td><td><button className={"kritis-badge"+(item.kritis?" active":"")} onClick={()=>toggleKritis(item)}>{item.kritis?"⚠ KRITIS":"—"}</button></td><td>{item.stock<=item.minStock?<span className="stock-warn"><Icon type="alert" size={14}/> {item.stock}</span>:<span className="stock-ok">{item.stock}</span>}</td><td style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--text2)"}}>{item.minStock}</td><td><div className="actions"><button className="btn btn-ghost btn-sm" onClick={()=>openEditItem(item)}><Icon type="edit" size={14}/></button><button className="btn btn-danger btn-sm" onClick={()=>handleDeleteItem(item.id)}><Icon type="trash" size={14}/></button></div></td></tr>)}</tbody></table>
                </div>
              </>}

              {page==="transaksi" && <>
                <h1 className="page-title">Riwayat Transaksi</h1><p className="page-sub">Catatan seluruh barang masuk dan keluar UGD</p>
                <div className="toolbar">
                  <div className="search-box"><Icon type="search" size={16}/><input placeholder="Cari item atau keterangan..." value={txSearch} onChange={e=>setTxSearch(e.target.value)}/></div>
                  <select value={filterType} onChange={e=>setFilterType(e.target.value)} className="select-box"><option value="semua">Semua Tipe</option><option value="masuk">Masuk</option><option value="keluar">Keluar</option></select>
                  <button className="btn btn-masuk" onClick={()=>{setFormTx({itemId:"",type:"masuk",qty:"",date:todayStr(),note:"",operator:""});setItemSearch("");setShowItemDropdown(false);setEditTx(null);setShowModal("addTx");}}><Icon type="arrowDown" size={16}/> Masuk</button>
                  <button className="btn btn-keluar" onClick={()=>{setFormTx({itemId:"",type:"keluar",qty:"",date:todayStr(),note:"",operator:""});setItemSearch("");setShowItemDropdown(false);setEditTx(null);setShowModal("addTx");}}><Icon type="arrowUp" size={16}/> Keluar</button>
                  <button className="btn btn-ghost" onClick={()=>setShowExport(true)} style={{color:"#a855f7",borderColor:"rgba(168,85,247,0.3)"}}><Icon type="download" size={16}/> Download Rekap</button>
                </div>
                <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"var(--radius)",overflow:"hidden"}}>
                  <table><thead><tr><th>Tanggal</th><th>Item</th><th>Tipe</th><th>Jumlah</th><th>Keterangan</th><th>Petugas</th><th>Aksi</th></tr></thead>
                  <tbody>{filteredTx.length===0?<tr><td colSpan={7} style={{textAlign:"center",padding:40,color:"var(--text3)"}}>Tidak ada transaksi</td></tr>:filteredTx.map(tx=><tr key={tx.id}><td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{formatDate(tx.date)}</td><td style={{fontWeight:500}}>{tx.itemName}</td><td><span className={"tag tag-"+tx.type}>{tx.type==="masuk"?"↓ Masuk":"↑ Keluar"}</span></td><td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{tx.qty}</td><td style={{color:"var(--text2)"}}>{tx.note||"-"}</td><td>{tx.operator}</td><td><button className="btn btn-ghost btn-sm" onClick={()=>openEditTx(tx)}><Icon type="edit" size={14}/></button></td></tr>)}</tbody></table>
                </div>
              </>}
            </div>
          </div>

          <div className="mobile-nav"><div className="mobile-nav-inner">
            <button className={"mobile-nav-btn "+(page==="dashboard"?"active":"")} onClick={()=>setPage("dashboard")}><Icon type="home" size={20}/> Home</button>
            <button className={"mobile-nav-btn "+(page==="stok"?"active":"")} onClick={()=>setPage("stok")}><Icon type="package" size={20}/> Stok</button>
            <button className={"mobile-nav-btn "+(page==="transaksi"?"active":"")} onClick={()=>setPage("transaksi")}><Icon type="clock" size={20}/> Transaksi</button>
          </div></div>

          {(showModal==="addItem"||showModal==="editItem") && <Modal title={editItem?"Edit Item":"Tambah Item Baru"} onClose={()=>{setShowModal(null);setEditItem(null);setFormError("");}}>
            {formError && <div className="form-error">{formError}</div>}
            <div className="form-group"><label className="form-label">Nama Item</label><input className="form-input" placeholder="Contoh: Paracetamol 500mg" value={formItem.name} onChange={e=>setFormItem({...formItem,name:e.target.value})}/></div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Kategori</label><select className="form-input" value={formItem.category} onChange={e=>setFormItem({...formItem,category:e.target.value})}>{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
              <div className="form-group"><label className="form-label">Satuan</label><select className="form-input" value={formItem.unit} onChange={e=>setFormItem({...formItem,unit:e.target.value})}>{UNITS.map(u=><option key={u} value={u}>{u}</option>)}</select></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">{editItem?"Stok Saat Ini":"Stok Awal"}</label><input className="form-input" type="number" min="0" value={formItem.stock} onChange={e=>setFormItem({...formItem,stock:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Minimum Stok</label><input className="form-input" type="number" min="0" value={formItem.minStock} onChange={e=>setFormItem({...formItem,minStock:e.target.value})}/></div>
            </div>
            <div className="form-group">
              <label className="form-label">Prioritas</label>
              <div className={"kritis-toggle"+(formItem.kritis?" active":"")} onClick={()=>setFormItem({...formItem,kritis:!formItem.kritis})}>
                <div className={"kritis-check"+(formItem.kritis?" checked":"")}>
                  {formItem.kritis&&<Icon type="check" size={14}/>}
                </div>
                <div>
                  <div className="kritis-label" style={formItem.kritis?{color:"var(--red)"}:{}}>Obat / Bahan Kritis (Emergency)</div>
                  <div className="kritis-sub">Tandai jika item ini penting untuk penanganan darurat</div>
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
              <button className="btn btn-ghost" onClick={()=>{setShowModal(null);setEditItem(null);setFormError("");}}>Batal</button>
              <button className="btn btn-primary" onClick={handleAddItem}><Icon type="check" size={16}/> {editItem?"Simpan":"Tambah"}</button>
            </div>
          </Modal>}

          {showModal==="addTx" && <Modal title={editTx?"Edit Transaksi":(formTx.type==="masuk"?"Catat Barang Masuk":"Catat Barang Keluar")} onClose={()=>{setShowModal(null);setEditTx(null);setFormError("");}}>
            {formError && <div className="form-error">{formError}</div>}
            <div className="form-group"><label className="form-label">Tipe Transaksi</label>
              <div style={{display:"flex",gap:8}}>
                <button className={"btn "+(formTx.type==="masuk"?"btn-masuk":"btn-ghost")} style={{flex:1}} onClick={()=>setFormTx({...formTx,type:"masuk"})}><Icon type="arrowDown" size={16}/> Masuk</button>
                <button className={"btn "+(formTx.type==="keluar"?"btn-keluar":"btn-ghost")} style={{flex:1}} onClick={()=>setFormTx({...formTx,type:"keluar"})}><Icon type="arrowUp" size={16}/> Keluar</button>
              </div>
            </div>
            <div className="form-group" ref={itemDropdownRef} style={{position:"relative"}}><label className="form-label">Pilih Item</label>
              <div style={{position:"relative"}}>
                <input className="form-input" style={{paddingLeft:"36px"}} placeholder="Ketik nama obat/bahan untuk mencari..." value={itemSearch} onChange={e=>{setItemSearch(e.target.value);setShowItemDropdown(true);if(!e.target.value)setFormTx(prev=>({...prev,itemId:""}));}} onFocus={()=>setShowItemDropdown(true)}/>
                <span style={{position:"absolute",left:12,top:11,color:"var(--text3)"}}><Icon type="search" size={16}/></span>
              </div>
              {showItemDropdown && (
                <div className="item-dropdown">
                  {searchFilteredItems.length===0 ? (
                    <div className="item-dropdown-empty">Tidak ditemukan</div>
                  ) : searchFilteredItems.slice(0,50).map(i=>(
                    <div key={i.id} className={"item-dropdown-row"+(formTx.itemId===i.id?" selected":"")} onClick={()=>selectItem(i)}>
                      <div className="item-dropdown-name">{i.name}</div>
                      <div className="item-dropdown-meta">
                        <span className="tag tag-cat" style={{fontSize:10}}>{i.category}</span>
                        <span style={{color:i.stock<=i.minStock&&i.stock>0?"var(--red)":i.stock===0?"var(--text3)":"var(--accent)",fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:600}}>Stok: {i.stock} {i.unit}</span>
                      </div>
                    </div>
                  ))}
                  {searchFilteredItems.length>50&&<div className="item-dropdown-empty">Menampilkan 50 dari {searchFilteredItems.length} item. Ketik lebih spesifik...</div>}
                </div>
              )}
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Jumlah</label><input className="form-input" type="number" min="1" value={formTx.qty} onChange={e=>setFormTx({...formTx,qty:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Tanggal</label><input className="form-input" type="date" value={formTx.date} onChange={e=>setFormTx({...formTx,date:e.target.value})}/></div>
            </div>
            <div className="form-group"><label className="form-label">Petugas</label><input className="form-input" placeholder="Nama perawat/petugas" value={formTx.operator} onChange={e=>setFormTx({...formTx,operator:e.target.value})}/></div>
            <div className="form-group"><label className="form-label">Keterangan</label><input className="form-input" placeholder="Contoh: Dari Farmasi / Pasien IGD-001" value={formTx.note} onChange={e=>setFormTx({...formTx,note:e.target.value})}/></div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
              <button className="btn btn-ghost" onClick={()=>{setShowModal(null);setEditTx(null);setFormError("");}}>Batal</button>
              <button className="btn btn-primary" onClick={handleAddTx}><Icon type="check" size={16}/> {editTx?"Simpan Perubahan":"Simpan"}</button>
            </div>
          </Modal>}

          {showExport && <Modal title="Download Rekap Transaksi" onClose={()=>{setShowExport(false);setExportCSV("");}}>
            {!exportCSV ? (<>
            <div className="form-group">
              <label className="form-label">Pilih Periode</label>
              <div style={{display:"flex",gap:8}}>
                <button className={"btn "+(exportMode==="bulan"?"btn-primary":"btn-ghost")} style={{flex:1}} onClick={()=>setExportMode("bulan")}>Per Bulan</button>
                <button className={"btn "+(exportMode==="rentang"?"btn-primary":"btn-ghost")} style={{flex:1}} onClick={()=>setExportMode("rentang")}>Rentang Tanggal</button>
              </div>
            </div>
            {exportMode==="bulan" ? (
              <div className="form-group"><label className="form-label">Bulan</label><input className="form-input" type="month" value={exportBulan} onChange={e=>setExportBulan(e.target.value)}/></div>
            ) : (
              <div className="form-row">
                <div className="form-group"><label className="form-label">Dari Tanggal</label><input className="form-input" type="date" value={exportFrom} onChange={e=>setExportFrom(e.target.value)}/></div>
                <div className="form-group"><label className="form-label">Sampai Tanggal</label><input className="form-input" type="date" value={exportTo} onChange={e=>setExportTo(e.target.value)}/></div>
              </div>
            )}
            <div className="export-preview">
              <div className="export-preview-label">Preview:</div>
              <div className="export-preview-count">
                {(()=>{
                  const f = exportMode==="bulan" ? transactions.filter(tx=>tx.date&&tx.date.startsWith(exportBulan)) : transactions.filter(tx=>tx.date&&tx.date>=exportFrom&&tx.date<=exportTo);
                  const m=f.filter(t=>t.type==="masuk"); const k=f.filter(t=>t.type==="keluar");
                  return f.length===0 ? <span style={{color:"var(--text3)"}}>Tidak ada transaksi pada periode ini</span>
                    : <><span style={{fontSize:22,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{f.length}</span> transaksi <span className="tag tag-masuk" style={{marginLeft:6}}>↓ {m.length} masuk</span> <span className="tag tag-keluar" style={{marginLeft:4}}>↑ {k.length} keluar</span></>;
                })()}
              </div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}>
              <button className="btn btn-ghost" onClick={()=>setShowExport(false)}>Batal</button>
              <button className="btn btn-primary" onClick={handleFilteredExport}><Icon type="download" size={16}/> Download CSV</button>
            </div>
            </>) : (<>
              <div className="info-banner green">
                <Icon type="check" size={16}/> Rekap berhasil dibuat! Jika file tidak otomatis terdownload, salin data di bawah lalu paste ke Notepad/Excel.
              </div>
              <div className="form-group">
                <label className="form-label">Nama File: {exportFilename}</label>
                <textarea className="form-input" style={{height:180,fontFamily:"'JetBrains Mono',monospace",fontSize:11,resize:"vertical"}} readOnly value={exportCSV}/>
              </div>
              <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                <button className="btn btn-ghost" onClick={()=>setExportCSV("")}>← Kembali</button>
                <button className="btn btn-primary" onClick={handleCopyCSV}><Icon type="check" size={16}/> Salin ke Clipboard</button>
              </div>
            </>)}
          </Modal>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
